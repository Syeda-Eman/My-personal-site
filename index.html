<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Portfolio!</title>
    <link rel="stylesheet" href="---">
    <style>
        *{margin: 0; padding:0; box-sizing: border-box;}
        body{
            background: linear-gradient(145deg, #fdf6e3 0%, #f2e9d0 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem 1.2rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card{
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 248, 235, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 4rem 2rem 4rem 2rem;
            padding: 2.2rem 2rem;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.25), 0 0 0 1px rgba(255, 215, 150, 0.3);
            transition: 0.2s;
            border: 2px solid #ffe5c4;
        }
        .flex{
            display:flex;
            flex-wrap: wrap; 
            align-items: center; 
            justify-content: space-between; 
            gap:1.5rem;}
        .avatar{
            background: #ffdbb5;
            width: 120px; height: 120px;
            border-radius: 50% 30% 50% 30%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.6rem;
            font-weight: 700;
            color: #4a2c1a;
            box-shadow: 8px 8px 0 #dbaa7a, 0 8px 20px rgba(0,0,0,0.1);
            border: 3px solid #fff1da;
            transform: rotate(-2deg);
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #3b2616;
        }
