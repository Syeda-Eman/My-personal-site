<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Portfolio!</title>
    <link rel="stylesheet" href="---">
    <style>
        *{margin: 0; padding:0; box-sizing: border-box;}
        body{
            background: linear-gradient(145deg, #fdf6e3 0%, #f2e9d0 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem 1.2rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card{
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 248, 235, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 4rem 2rem 4rem 2rem;
            padding: 2.2rem 2rem;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.25), 0 0 0 1px rgba(255, 215, 150, 0.3);
            transition: 0.2s;
            border: 2px solid #ffe5c4;
        }
        .flex{
            display:flex;
            flex-wrap: wrap; 
            align-items: center; 
            justify-content: space-between; 
            gap:1.5rem;}
        .avatar{
            background: #ffdbb5;
            width: 120px; height: 120px;
            border-radius: 50% 30% 50% 30%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.6rem;
            font-weight: 700;
            color: #4a2c1a;
            box-shadow: 8px 8px 0 #dbaa7a, 0 8px 20px rgba(0,0,0,0.1);
            border: 3px solid #fff1da;
            transform: rotate(-2deg);
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #3b2616;
        }
        .glow{background: #fce3c7; padding: 0.2rem 1.2rem; border-radius: 60px; display: inline-block; font-weight: 600; font-size: 0.85rem; color: #603e24;}
        .tagline{font-size: 1.2rem; color: #5c3f28; max-width: 400px; margin: 0.5rem 0 1.2rem;}
        .btn{
            background: #3b2616; color:#fff6e5; border: none; padding: 0.6rem 1.8rem; border-radius: 60px;
            font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;
            transition: 0.15s; border: 2px solid #3b2616;
        }
        .btn-outline {background: transparent; color: #3b2616; border-color: #bb9a7a;}
        .btn-outline i {color: #3b2616;}
        .btn:hover {transform: scale(0.96); background: #5f3f28;}
        .btn-outline:hover{background: #f2dfca;}
        .section{margin:2.8rem 0 2rem;}
        h2{font-size: 1.8rem; font-weight: 700; color:#3b2616; display: flex; align-items: center; gap: 0.6rem; border-bottom:4px dashed #dbaa7a; padding-bottom:0.3rem; width: fit-content;}
